<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام التحول الرقمي | دعم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<!-- مكتبة SheetJS للتعامل مع ملفات إكسل -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#e7f0dd;
    --green:#5c8a3a;
    --green-dark:#43712b;
    --green-darker:#345a20;
    --card-bg:#ffffff;
    --input-bg:#eef6e6;
    --input-border:#cfe3bd;
    --text-dark:#2b3a22;
    --text-gray:#6b7a61;
    --topbar-bg:#e2e2e2;
    --danger:#b3423a;
    --danger-dark:#8f332c;
    --radius:14px;
    --shadow:0 6px 24px rgba(52,74,32,.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Tajawal',-apple-system,'Segoe UI',sans-serif;
    background:var(--bg);
    color:var(--text-dark);
    min-height:100vh;
  }
  #app{max-width:1200px;margin:0 auto;padding:22px 22px 60px;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;}
  input,select,textarea{font-family:inherit;}

  /* ---------- Topbar ---------- */
  .topbar{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--topbar-bg);border-radius:12px;padding:14px 20px;margin-bottom:22px;gap:16px;flex-wrap:wrap;
  }
  .topbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .topbar-datetime{font-size:13px;color:#555;line-height:1.5;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-text{text-align:right;line-height:1.5;}
  .brand-title{color:var(--green);font-weight:800;font-size:18px;}
  .brand-sub{color:var(--text-gray);font-size:12.5px;font-weight:500;}
  .logo-img{width:auto;max-width:180px;height:65px;object-fit:contain;border-radius:8px;}

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    padding:10px 18px;border-radius:10px;font-weight:700;font-size:14px;
    background:var(--green-dark);color:#fff;transition:.15s;white-space:nowrap;
  }
  .btn:hover{background:var(--green-darker);}
  .btn.light{background:#dcecc9;color:var(--green-darker);}
  .btn.light:hover{background:#cfe3ba;}
  .btn.outline{background:transparent;color:var(--green-dark);border:1.5px solid var(--green-dark);}
  .btn.outline:hover{background:#eef6e6;}
  .btn.danger{background:var(--danger);}
  .btn.danger:hover{background:var(--danger-dark);}
  .btn.excel{background:#1d6f42;color:#fff;}
  .btn.excel:hover{background:#155732;}
  .btn.sm{padding:6px 12px;font-size:12.5px;border-radius:8px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;}

  /* ---------- Card / Login ---------- */
  .center-wrap{display:flex;justify-content:center;padding-top:40px;}
  .login-card{
    background:var(--card-bg);border-radius:20px;box-shadow:var(--shadow);
    width:100%;max-width:520px;padding:40px 42px 46px;text-align:center;
  }
  .login-logo{width:auto;height:100px;max-width:100%;margin:0 auto 14px;object-fit:contain;}
  .login-title{color:var(--green);font-weight:800;font-size:22px;margin:6px 0 2px;}
  .login-sub{color:var(--text-gray);font-size:14px;margin-bottom:30px;}
  .field-label{display:block;color:var(--green-darker);font-weight:700;font-size:15px;margin-bottom:10px;}
  .field-input{
    width:100%;padding:14px 16px;border-radius:10px;border:1.5px solid var(--input-border);
    background:var(--input-bg);font-size:15px;color:var(--text-dark);outline:none;
  }
  .field-input:focus{border-color:var(--green);}
  .field-input::placeholder{color:#8fae7a;}
  .mt{margin-top:22px;}
  .link-muted{display:block;margin-top:22px;color:var(--green-dark);font-weight:700;font-size:14px;}
  .link-muted:hover{text-decoration:underline;}
  .error-msg{background:#fbe7e5;color:var(--danger-dark);border-radius:10px;padding:10px 14px;font-size:13.5px;margin-top:14px;text-align:right;}
  .ok-msg{background:#e5f3da;color:var(--green-darker);border-radius:10px;padding:10px 14px;font-size:13.5px;margin-top:14px;text-align:right;}

  /* ---------- Panel Card ---------- */
  .panel{background:var(--card-bg);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:24px;}
  .panel-header{background:var(--green-dark);color:#fff;padding:18px 24px;font-size:18px;font-weight:800;display:flex;justify-content:space-between;align-items:center;}
  .panel-body{padding:26px;}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
  @media(max-width:800px){.grid{grid-template-columns:1fr;}}
  .field{display:flex;flex-direction:column;gap:8px;}
  .field label{font-weight:700;color:var(--green-darker);font-size:14px;}
  .field .readonly{background:#f2f2f2;color:#666;}

  /* ---------- Chips ---------- */
  .chip-group{display:flex;flex-wrap:wrap;gap:10px;}
  .chip{
    display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;
    border:1.5px solid var(--input-border);background:var(--input-bg);font-size:13.5px;
    font-weight:600;color:var(--text-dark);cursor:pointer;user-select:none;
  }
  .chip input{accent-color:var(--green-dark);}
  .chip.checked{background:#dcecc9;border-color:var(--green);color:var(--green-darker);}

  /* ---------- Tabs ---------- */
  .tabs{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
  .tab{padding:9px 18px;border-radius:10px;font-weight:700;font-size:13.5px;background:#fff;color:var(--green-dark);box-shadow:0 2px 8px rgba(0,0,0,.05);cursor:pointer;}
  .tab.active{background:var(--green-dark);color:#fff;}

  /* ---------- Table ---------- */
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th.sortable { cursor: pointer; user-select: none; transition: background 0.2s; position: relative; padding-right:20px;}
  th.sortable:hover { background: var(--green-darker); }
  .sort-icon { font-size: 11px; margin-right: 5px; opacity: 0.6; display: inline-block; width: 12px; }
  .sort-icon.active { opacity: 1; color: #fff; }
  thead th{background:var(--green-dark);color:#fff;padding:11px 10px;text-align:center;font-weight:700;white-space:nowrap;}
  tbody td{padding:10px;text-align:center;border-bottom:1px solid #eee;vertical-align:middle;}
  tbody tr:hover{background:#f7faf3;}
  .table-scroll{ overflow-x:auto; padding-bottom:120px; }
  .status-pill{padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;}
  .status-saved{background:#fdecd2;color:#93650b;}
  .status-done{background:#dcecc9;color:var(--green-darker);}

  details.action-pop{position:relative;display:inline-block;}
  details.action-pop summary{list-style:none;cursor:pointer;padding:6px 12px;border-radius:8px;background:var(--input-bg);border:1px solid var(--input-border);font-size:12.5px;font-weight:600;}
  details.action-pop summary::-webkit-details-marker{display:none;}
  details.action-pop .pop-menu{
    position:absolute;z-index:999;top:110%;right:0;background:#fff;border-radius:10px;
    box-shadow:0 8px 30px rgba(0,0,0,0.15);padding:10px;min-width:180px;text-align:right;
    border:1px solid #ddd;
  }
  details.action-pop .pop-menu label{display:flex;align-items:center;gap:6px;font-size:12.5px;padding:6px 4px;cursor:pointer;justify-content:flex-end;}
  details.action-pop .pop-menu label:hover{background:#f5f9f0;}

  .filters-row{display:flex;gap:14px;flex-wrap:wrap;align-items:end;margin-bottom:18px;background:#f7faf3;padding:15px;border-radius:12px;border:1px solid var(--input-border);}
  .filters-row .field{min-width:150px;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
  .search-input{padding:10px 14px;border-radius:10px;border:1.5px solid var(--input-border);background:var(--input-bg);min-width:260px;}

  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .modal{background:#fff;border-radius:16px;max-width:560px;width:100%;max-height:88vh;overflow:auto;box-shadow:var(--shadow);}
  .modal-header{background:var(--green-dark);color:#fff;padding:16px 22px;font-weight:800;font-size:16px;display:flex;justify-content:space-between;align-items:center;}
  .modal-body{padding:22px;}
  .modal-close{background:transparent;color:#fff;font-size:20px;line-height:1;border:none;cursor:pointer;}

  .hint{font-size:12.5px;color:var(--text-gray);margin-top:6px;line-height:1.6;}
  .badge{display:inline-block;background:#dcecc9;color:var(--green-darker);border-radius:999px;padding:2px 10px;font-size:11.5px;font-weight:700;}
  .empty-state{text-align:center;color:var(--text-gray);padding:40px 10px;font-size:14px;}
  textarea.field-input{resize:vertical;min-height:90px;}

  /* ---------- Print (مقاس A4 وإزالة المسارات وتوسيط الخلايا) ---------- */
  #printArea { display: none; }
  
  @media print {
    @page {
      size: A4 portrait; /* إجبار مقاس الورقة لتكون A4 وتطبع بشكل عمودي */
      margin: 0; /* تعيين الحواف لصفر يزيل مسار الملف والتاريخ ورقم الصفحة تلقائياً من المتصفح */
    }
    body {
      margin: 0 !important;
      padding: 12mm !important; /* مسافة أمان داخلية للطباعة بعيداً عن حواف الورقة */
      background: #fff;
    }
    html, body {
      height: max-content !important; 
      min-height: auto !important;
    }
    #app { display: none !important; }
    #printArea {
      display: block !important;
      position: relative !important;
      width: 100%;
      margin: 0;
      padding: 0;
    }
    .print-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #345a20;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }
    .print-head img { max-width: 180px; max-height: 60px; object-fit: contain; }
    .print-title { text-align: right; }
    .print-title h1 { font-size: 16px; margin: 0; color: #345a20; }
    .print-title p { font-size: 11px; margin: 2px 0 0; color: #555; }
    .print-meta { font-size: 11px; color: #333; margin-bottom: 15px; display: flex; justify-content: space-between; font-weight: bold; }
    
    #printArea table {
      width: 100% !important;
      font-size: 10.5px !important; /* تصغير الخط ليتسع بشكل ممتاز */
      border-collapse: collapse;
      margin: 0 auto;
    }
    #printArea th, #printArea td {
      padding: 4px 3px !important;
      word-break: break-word !important; 
      border: 1px solid #ccc !important; 
      text-align: center !important; 
      vertical-align: middle !important; 
    }
    #printArea th {
      background-color: #345a20 !important; 
      color: white !important;
      -webkit-print-color-adjust: exact; 
      print-color-adjust: exact;
    }
    #printArea tr { page-break-inside: avoid; } 
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="printArea"></div>

<script>
/* ============================================================
   DAWAM / SABYA SUPPORT SYSTEM 
   ============================================================ */

const STORE_KEY = 'sabya_support_db_v1';
const SERVICE_OPTIONS = ['أنظمة','أجهزة','طابعات','ماسح ضوئي','شبكة نت','أخرى'];
const ACTION_OPTIONS  = ['جديد','تثبيت','صيانة','فورمات','ربط','كلمة مرور'];
const DEFAULT_LOGO = "data:image/svg+xml;utf8," + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100"><rect width="400" height="100" rx="15" fill="#f7faf3"/><text x="200" y="55" font-family="Tajawal, sans-serif" font-size="28" font-weight="bold" fill="#345a20" text-anchor="middle">أمانة منطقة جازان</text><text x="200" y="80" font-family="sans-serif" font-size="14" font-weight="bold" fill="#5c8a3a" text-anchor="middle">Jazan Municipality</text></svg>`);

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

/* دالة حماية النصوص العادية */
function esc(s){ 
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); 
}

/* دالة خاصة بجداول العرض والطباعة: تضع علامة - للبيانات المفقودة وتوسيطها */
function dis(s){
    let str = String(s ?? '').trim();
    if(str === '' || str === '—' || str === 'x' || str === 'null' || str === 'undefined') return '-';
    return esc(str);
}

function todayStr(d){ d = d || new Date(); return d.toISOString().slice(0,10); }

/* ---------------- DB layer ---------------- */
function loadDB(){
  let raw = localStorage.getItem(STORE_KEY);
  let db = null;
  if(raw){
    try{ db = JSON.parse(raw); }catch(e){ console.error('DB parse error', e); }
  }
  
  if(!db) {
    db = {
      employees: [
        { id:'2020', name:'محمد علي محمد الخالدي', nationalId:'1012345678', mobile:'0501234567',
          email:'msjjsa@momah.gov.sa', job:'فني دعم تقني', dept:'تقنية المعلومات', section:'الدعم الفني', isAdmin:true }
      ],
      tickets: [],
      settings: {
        adminPassword: 'admin',
        orgLine1: 'نظام التحول الرقمي | دعم',
        orgLine2: 'بلدية محافظة صبيا',
        logo: DEFAULT_LOGO
      }
    };
  }
  return db;
}

function saveDB(){ 
  if(DB.employees && DB.employees.length > 0) {
      DB.employees.sort((a, b) => {
          let numA = Number(a.id), numB = Number(b.id);
          if(!isNaN(numA) && !isNaN(numB)) return numA - numB;
          return String(a.id).localeCompare(String(b.id), 'ar');
      });
  }
  localStorage.setItem(STORE_KEY, JSON.stringify(DB)); 
}
let DB = loadDB();

/* ---------------- App state ---------------- */
let session = null;
let route = 'login';
let saTab = 'tickets';
let formServices = [];
let formCustomService = '';
let formNotes = '';
let empSearch = '';
let ticketSearch = ''; 
let importPreview = null;
let uiMsg = null;

let selectedEmpIds = []; 
let selectedTicketIds = []; // تتبع الطلبات المحددة في لوحة الإدارة

let sortState = {
    ticket: { col: null, dir: 1 },
    emp:    { col: null, dir: 1 }
};

function setMsg(type,text){ uiMsg = {type,text}; }
function clearMsg(){ uiMsg=null; }

/* ---------------- Helpers ---------------- */
function findEmployee(id){ return DB.employees.find(e => String(e.id).trim() === String(id).trim()); }
function fmtDateTime(){
  const now = new Date();
  const d = now.toLocaleDateString('ar', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  const t = now.toLocaleTimeString('ar', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  return d + '، ' + t;
}
setInterval(()=>{ const el = document.getElementById('liveClock'); if(el) el.textContent = fmtDateTime(); }, 1000);

function getUniqueDbValues(key) {
   return [...new Set(DB.employees.map(e => e[key]).filter(Boolean))];
}

function topbar(leftButtonsHtml){
  return `
  <div class="topbar">
    <div class="topbar-left">
      ${leftButtonsHtml}
    </div>
    <div class="brand">
      <div class="brand-text">
        <div class="brand-title">${esc(DB.settings.orgLine1)}</div>
        <div class="brand-sub">${esc(DB.settings.orgLine2)}</div>
      </div>
      <img class="logo-img" src="${DB.settings.logo}" alt="logo">
    </div>
  </div>`;
}
function clockLine(){
  return `<div class="topbar-datetime" id="liveClock">${fmtDateTime()}</div>`;
}

function msgHtml(){
  if(!uiMsg) return '';
  const cls = uiMsg.type === 'error' ? 'error-msg' : 'ok-msg';
  return `<div class="${cls}">${esc(uiMsg.text)}</div>`;
}

/* ---------------- Table Sorting Logic ---------------- */
function handleSort(type, col) {
    let s = sortState[type];
    if(s.col === col) {
        if(s.dir === 1) s.dir = -1;
        else { s.col = null; s.dir = 1; }
    } else {
        s.col = col; s.dir = 1;
    }
    render();
}

function getSortIcon(type, col) {
    let s = sortState[type];
    if(s.col !== col) return '<span class="sort-icon">↕</span>';
    return s.dir === 1 ? '<span class="sort-icon active">▴</span>' : '<span class="sort-icon active">▾</span>';
}

function sortArrayData(arr, col, dir) {
    if(!col) return arr; 
    return [...arr].sort((a, b) => {
        let valA = a[col] || '';
        let valB = b[col] || '';
        if(!isNaN(valA) && !isNaN(valB) && valA !== '' && valB !== '') {
            return (Number(valA) - Number(valB)) * dir;
        }
        return String(valA).localeCompare(String(valB), 'ar') * dir;
    });
}

/* ============================================================
   RENDER 
   ============================================================ */
function render(){
  const app = document.getElementById('app');
  
  let focusedId = document.activeElement ? document.activeElement.id : null;
  let selectionStart = 0;
  let selectionEnd = 0;
  
  if (focusedId && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA')) {
      try {
          selectionStart = document.activeElement.selectionStart;
          selectionEnd = document.activeElement.selectionEnd;
      } catch(e) {}
  }

  let html = '';
  if(!session){
    html = route === 'adminLogin' ? renderAdminLogin() : renderLogin();
  } else if(session.type === 'superadmin'){
    html = renderSuperAdmin();
  } else {
    if(route === 'adminBoard' && session.emp.isAdmin) html = renderAdminBoard();
    else if(route === 'empHistory') html = renderEmployeeHistory();
    else html = renderEmployeeHome();
  }
  
  app.innerHTML = html;

  if (focusedId) {
      let el = document.getElementById(focusedId);
      if (el) {
          el.focus();
          try {
              if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                  el.setSelectionRange(selectionStart, selectionEnd);
              }
          } catch(e) {}
      }
  }
}

/* ---------------- LOGIN SCREENS ---------------- */
function renderLogin(){
  return `
  <div class="center-wrap">
    <div class="login-card">
      <img class="login-logo" src="${DB.settings.logo}" alt="logo">
      <div class="login-title">${esc(DB.settings.orgLine1)}</div>
      <div class="login-sub">${esc(DB.settings.orgLine2)}</div>
      <label class="field-label">الرقم الوظيفي</label>
      <input id="empIdInput" class="field-input" placeholder="أدخل رقمك الوظيفي" autofocus
             onkeydown="if(event.key==='Enter') doEmployeeLogin()">
      ${msgHtml()}
      <button class="btn mt" style="width:100%" onclick="doEmployeeLogin()">تسجيل دخول الموظف</button>
      <a class="link-muted" href="#" onclick="clearMsg();route='adminLogin';render();return false;">دخول مسؤول النظام / الإدارة</a>
    </div>
  </div>`;
}
function doEmployeeLogin(){
  const id = document.getElementById('empIdInput').value.trim();
  if(!id){ setMsg('error','يرجى إدخال الرقم الوظيفي'); render(); return; }
  const emp = findEmployee(id);
  if(!emp){ setMsg('error','الرقم الوظيفي غير مسجل. يرجى التواصل مع الإدارة لإضافتك في النظام.'); render(); return; }
  clearMsg();
  session = { type:'employee', emp };
  route = 'empHome';
  formServices = []; formCustomService = ''; formNotes = '';
  render();
}

function renderAdminLogin(){
  return `
  <div class="center-wrap">
    <div class="login-card">
      <img class="login-logo" src="${DB.settings.logo}" alt="logo">
      <div class="login-title">دخول الإدارة العامة</div>
      <div class="login-sub">صلاحيات كاملة على قاعدة البيانات والنظام</div>
      <label class="field-label">كلمة المرور</label>
      <input id="adminPassInput" type="password" class="field-input" placeholder="••••••••" autofocus
             onkeydown="if(event.key==='Enter') doAdminLogin()">
      ${msgHtml()}
      <button class="btn mt" style="width:100%" onclick="doAdminLogin()">دخول</button>
      <a class="link-muted" href="#" onclick="clearMsg();route='login';render();return false;">رجوع لتسجيل دخول الموظف</a>
    </div>
  </div>`;
}
function doAdminLogin(){
  const p = document.getElementById('adminPassInput').value;
  if(p !== DB.settings.adminPassword){ setMsg('error','كلمة المرور غير صحيحة'); render(); return; }
  clearMsg();
  session = { type:'superadmin' };
  saTab = 'tickets';
  render();
}

function logout(){ session=null; route='login'; clearMsg(); render(); }

/* ---------------- EMPLOYEE: NEW REQUEST ---------------- */
function renderEmployeeHome(){
  const emp = session.emp;
  const leftBtns = `
    <button class="btn light sm" onclick="route='empHistory';render();">سجل الطلبات</button>
    ${emp.isAdmin ? `<button class="btn sm" onclick="route='adminBoard';render();">لوحة الإدارة (صلاحية خاصة)</button>` : ''}
    <button class="btn outline sm" onclick="logout()">تسجيل الخروج</button>
    ${clockLine()}
  `;
  const chips = SERVICE_OPTIONS.map(s => {
    const checked = formServices.includes(s);
    return `<label class="chip ${checked?'checked':''}">
      <input type="checkbox" ${checked?'checked':''} onchange="toggleService('${s}')"> ${s}
    </label>`;
  }).join('');
  return `
  ${topbar(leftBtns)}
  <div class="panel">
    <div class="panel-header">تقديم طلب دعم جديد | مرحبًا: ${esc(emp.name)}</div>
    <div class="panel-body">
      <div class="grid">

function toggleService(s){
  const i = formServices.indexOf(s);
  if(i>-1) formServices.splice(i,1); else formServices.push(s);
  render();
}
function submitTicket(){
  if(formServices.length === 0){ setMsg('error','يرجى اختيار تفاصيل الخدمة على الأقل'); render(); return; }
  if(formServices.includes('أخرى') && !formCustomService.trim()){
    setMsg('error','يرجى كتابة تفاصيل الخدمة المطلوبة عند اختيار "أخرى"'); render(); return;
  }
  const emp = session.emp;
  DB.tickets.unshift({
    id: uid(),
    empId: emp.id, empName: emp.name, empEmail: emp.email,
    services: [...formServices],
    customService: formCustomService.trim(),
    notes: formNotes.trim(),
    action: [],
    status: 'حفظ',
    createdAt: new Date().toISOString()
  });
  saveDB();
  formServices = []; formCustomService = ''; formNotes = '';
  setMsg('ok','تم إرسال الطلب بنجاح، سيتم التواصل معك عند إنجازه.');
  render();
}

function cancelTicket(id) {
    if(!confirm('هل أنت متأكد أنك لم تعد بحاجة لهذه الخدمة وتريد حذف الطلب؟ (لن يظهر في سجلك بعد الآن)')) return;
    const t = DB.tickets.find(x => x.id === id);
    if(t) {
        t.status = 'محذوف من قبل الموظف'; 
        saveDB();
        setMsg('ok', 'تم حذف الطلب بنجاح.');
        render();
    }
}

function serviceLabel(t){
  let s = t.services.filter(x=>x!=='أخرى').join(' - ');
  if(t.services.includes('أخرى')) s += (s?' - ':'') + 'أخرى: ' + t.customService;
  return s || '';
}

/* ---------------- ADMIN BOARD (granted employee) ---------------- */
let boardFrom='', boardTo='';

function getFilteredTickets() {
  let rawRows = DB.tickets;
  if(boardFrom) rawRows = rawRows.filter(t => todayStr(new Date(t.createdAt)) >= boardFrom);
  if(boardTo) rawRows = rawRows.filter(t => todayStr(new Date(t.createdAt)) <= boardTo);
  
  if(ticketSearch) {
      const q = ticketSearch.toLowerCase();
      rawRows = rawRows.filter(t => 
          (t.empId && t.empId.toLowerCase().includes(q)) || 
          (t.empName && t.empName.toLowerCase().includes(q))
      );
  }
  return rawRows;
}

function ticketRow(t){
  const actionsChecklist = ACTION_OPTIONS.map(a => `
    <label><input type="checkbox" ${t.action.includes(a)?'checked':''} onchange="toggleTicketAction('${t.id}','${a}')"> ${a}</label>
  `).join('');
  
  const isDeleted = t.status === 'محذوف من قبل الموظف';
  const statusSelectStyle = `padding:5px 8px; font-size:12.5px; min-width:125px; ${isDeleted ? 'color:var(--danger-dark); font-weight:bold; background-color:#fbe7e5; border-color:var(--danger);' : ''}`;

  return `
  <tr>
    <td><input type="checkbox" onchange="toggleSelectTicket('${t.id}')" ${selectedTicketIds.includes(t.id) ? 'checked' : ''} style="accent-color:var(--green-dark); width:16px; height:16px; cursor:pointer;"></td>
    <td style="font-weight:bold;">${dis(t.empId)}</td>
    <td>${dis(t.empName)}</td>
    <td>${dis(serviceLabel(t))}</td>
    <td style="color:#555;font-size:12.5px;max-width:200px;">${dis(t.notes)}</td>
    <td>
      <details class="action-pop">
        <summary>${t.action.length? t.action.length+' محدد ▾' : 'اختر الإجراء ▾'}</summary>
        <div class="pop-menu">${actionsChecklist}</div>
      </details>
    </td>
    <td>
      <select class="field-input" style="${statusSelectStyle}" onchange="setTicketStatus('${t.id}', this.value)">
        <option value="حفظ" ${t.status==='حفظ'?'selected':''}>حفظ</option>
        <option value="منجز" ${t.status==='منجز'?'selected':''}>منجز</option>

      </select>
    </td>
    <td style="font-size:12px;">${new Date(t.createdAt).toLocaleDateString('ar')}</td>
  </tr>`;
}

function toggleTicketAction(id, action){
  const t = DB.tickets.find(x=>x.id===id); if(!t) return;
  const i = t.action.indexOf(action);
  if(i>-1) t.action.splice(i,1); else t.action.push(action);
  saveDB(); render();
}
function setTicketStatus(id, status){
  const t = DB.tickets.find(x=>x.id===id); if(!t) return;
  t.status = status; saveDB(); render();
}

  rows.sort((a, b) => {
      let numA = Number(a.empId), numB = Number(b.empId);
      if(!isNaN(numA) && !isNaN(numB)) return numA - numB;
      return String(a.empId).localeCompare(String(b.empId), 'ar');
  });

  const rangeText = (boardFrom||boardTo) ? `الفترة من ${boardFrom||'-'} إلى ${boardTo||'-'}` : 'كل الطلبات';
  let filterText = ticketSearch ? ` | تم البحث عن: "${ticketSearch}"` : '';

  const html = `
    <div class="print-head">
      <img src="${DB.settings.logo}">
      <div class="print-title">
        <h1>${esc(DB.settings.orgLine1)}</h1>
        <p>${esc(DB.settings.orgLine2)}</p>
      </div>
    </div>
    <div class="print-meta">
      <span>تقرير طلبات الدعم — ${esc(rangeText)} ${esc(filterText)} (مرتب برقم الموظف)</span>
      <span>عدد الطلبات: ${rows.length} | تاريخ الطباعة: ${new Date().toLocaleDateString('ar')}</span>
    </div>
    <table>
      <thead><tr>
        <th>الرقم الوظيفي</th>
        <th>السجل المدني</th>
        <th>اسم الموظف</th>
        <th>رقم الجوال</th>
        <th>ايميل الموظف</th>
        <th>الخدمة المطلوبة</th>
        <th>الملاحظات</th>
        <th>الإجراء</th>
        <th>الحالة</th>
        <th>التاريخ</th>
      </tr></thead>
      <tbody>
        ${rows.map(t => {
          const emp = findEmployee(t.empId) || {};
          return `<tr>
            <td>${dis(t.empId)}</td>
            <td>${dis(emp.nationalId)}</td>
            <td>${dis(t.empName)}</td>
            <td>${dis(emp.mobile)}</td>
            <td>${dis(t.empEmail || emp.email)}</td>
            <td>${dis(serviceLabel(t))}</td>
            <td>${dis(t.notes)}</td>
            <td>${t.action.length > 0 ? esc(t.action.join('، ')) : '-'}</td>
            <td>${dis(t.status)}</td>
            <td>${new Date(t.createdAt).toLocaleDateString('ar')}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
  document.getElementById('printArea').innerHTML = html;
  
  setTimeout(()=>window.print(), 200);
}

/* تصدير الطلبات للإكسل */
function exportTicketsExcel(){
  let rows = getFilteredTickets();
  if(rows.length === 0) { alert("لا يوجد بيانات لتصديرها في هذا النطاق"); return; }

  const exportData = rows.map(t => {
      const emp = findEmployee(t.empId) || {};
      return {
          'الرقم الوظيفي': dis(t.empId),
          'اسم الموظف': dis(t.empName),
          'السجل المدني': dis(emp.nationalId),
          'رقم الجوال': dis(emp.mobile),
          'البريد الإلكتروني': dis(t.empEmail || emp.email),
          'الخدمة المطلوبة': dis(serviceLabel(t)),
          'ملاحظات الموظف': dis(t.notes),
          'الإجراء المتخذ': t.action.length > 0 ? t.action.join('، ') : '-',
          'الحالة': dis(t.status),
          'تاريخ الطلب': new Date(t.createdAt).toLocaleString('ar')
      };
  });

  const ws = XLSX.utils.json_to_sheet(exportData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "طلبات الدعم");
  XLSX.writeFile(wb, `طلبات_الدعم_${todayStr()}.xlsx`);
}

function exportEmployeesExcel() {
    if(DB.employees.length === 0) { alert("لا يوجد موظفين لتصديرهم"); return; }
    
    const ticketCounts = {};
    if(DB.tickets) {
        DB.tickets.forEach(t => { ticketCounts[t.empId] = (ticketCounts[t.empId]||0) + 1; });
    }
    
    const exportData = DB.employees.map(e => ({
        'الرقم الوظيفي': dis(e.id),
        'الاسم': dis(e.name),
        'السجل المدني': dis(e.nationalId),
        'رقم الجوال': dis(e.mobile),
        'الإيميل': dis(e.email),
        'الوظيفة': dis(e.job),
        'الإدارة': dis(e.dept),
        'القسم': dis(e.section),
        'عدد الطلبات': ticketCounts[e.id] || 0
    }));
    
    const ws = XLSX.utils.json_to_sheet(exportData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "الموظفين");
    XLSX.writeFile(wb, `قاعدة_الموظفين_${todayStr()}.xlsx`);
}

function startEditEmp(id){
  const e = findEmployee(id); if(!e) return;
  editingEmpId = id;
  empForm = {...e};
  clearMsg(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function deleteEmp(id){
  if(!confirm('تأكيد حذف هذا الموظف نهائيًا من قاعدة البيانات؟ لا يمكن التراجع عن هذا الإجراء.')) return;
  DB.employees = DB.employees.filter(e => e.id !== id);
  selectedEmpIds = selectedEmpIds.filter(selectedId => selectedId !== id);
  saveDB(); render();
}
function saveEmpForm(){
  if(!empForm.id.trim() || !empForm.name.trim()){ setMsg('error','الرقم الوظيفي والاسم حقلان مطلوبان'); render(); return; }
  
  if(editingEmpId){
    if(editingEmpId !== empForm.id.trim()) {
        if(findEmployee(empForm.id)) {
            setMsg('error','هذا الرقم الوظيفي الجديد مسجل مسبقًا في قاعدة البيانات'); render(); return;
        }
        DB.tickets.forEach(t => {
            if(t.empId === editingEmpId) {
                t.empId = empForm.id.trim();
                t.empName = empForm.name.trim(); 
            }
        });
        
        const selIdx = selectedEmpIds.indexOf(editingEmpId);
        if(selIdx > -1) selectedEmpIds[selIdx] = empForm.id.trim();
    }
    const idx = DB.employees.findIndex(e => e.id === editingEmpId);
    DB.employees[idx] = {...DB.employees[idx], ...empForm};
  } else {
    if(findEmployee(empForm.id)){ setMsg('error','هذا الرقم الوظيفي مسجل مسبقًا في قاعدة البيانات'); render(); return; }
    DB.employees.push({...empForm, isAdmin:false});
  }
  
  saveDB();
  editingEmpId = null; empForm = emptyEmpForm();
  setMsg('ok','تم حفظ وتحديث بيانات الموظف بنجاح');
  render();
}

/* ---- Smart Excel import ---- */
function normalizeHeader(str) {
    if(!str) return '';
    return String(str).replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').replace(/\s+/g, '').trim().toLowerCase();
}

const HEADER_MAP = {
  'الرقمالوظيفي':'id', 'رقمالموظف':'id', 'id':'id',
  'الاسمباللغهالعربيه':'name', 'الاسم':'name', 'اسمالموظف':'name', 'name':'name',
  'السجلالمدني':'nationalId', 'رقمالسجلالمدني':'nationalId', 'nationalid':'nationalId',
  'رقمالجوال':'mobile', 'الجوال':'mobile', 'mobile':'mobile',
  'ايميل':'email', 'الايميل':'email', 'البريدالالكتروني':'email', 'email':'email',
  'الوظيفه':'job', 'job':'job',
  'الاداره':'dept', 'dept':'dept',
  'القسم':'section', 'section':'section'
};

function handleExcelImport(evt){
  const file = evt.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet, {defval:''});
      
      const rows = json.map(r => {
        const row = emptyEmpForm();
        Object.keys(r).forEach(h => {
          const cleanHeader = normalizeHeader(h);
          const key = HEADER_MAP[cleanHeader];
          if(key) {
              row[key] = (String(r[h]).trim() === 'x' || String(r[h]).trim() === '-') ? '' : String(r[h]).trim();
          }
        });
        
        if(!row.id || row.id === 'x' || row.id === '-') {
           row.id = 'مؤقت-' + Math.floor(10000 + Math.random() * 90000);
        }
        return row;
      });
      
      if(rows.length === 0){ alert('الملف المرفوع فارغ أو لا يحتوي على بيانات صالحة.'); return; }
      importPreview = { rows, source:'excel' };
      render();
    }catch(err){
      alert('حدث خطأ في قراءة الملف: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  evt.target.value = '';
}

function upsertEmployees(rows){
  let added=0, updated=0;
  rows.forEach(r => {
    if(!r.id || r.id === 'x' || r.id === '-') return;
    const idx = DB.employees.findIndex(e => e.id === r.id);
    if(idx>-1){ DB.employees[idx] = {...DB.employees[idx], ...r}; updated++; }
    else { DB.employees.push({...r, isAdmin:false}); added++; }
  });
  saveDB(); 
  setMsg('ok', `تم الانتهاء بنجاح: إضافة ${added} موظف، وتحديث بيانات ${updated} موظف مسجل مسبقاً.`);
}
function confirmExcelImport(){
  upsertEmployees(importPreview.rows);
  importPreview = null;
  render();
}

  const file = evt.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => { DB.settings.logo = e.target.result; saveDB(); render(); };
  reader.readAsDataURL(file);
}
function saveOrgSettings(){
  DB.settings.orgLine1 = document.getElementById('orgLine1').value.trim() || DB.settings.orgLine1;
  DB.settings.orgLine2 = document.getElementById('orgLine2').value.trim() || DB.settings.orgLine2;
  saveDB();
  setMsg('ok','تم حفظ التعديلات'); render();
}

function exportBackupExcel(){
  try {
      const wb = XLSX.utils.book_new();

      const ticketCounts = {};
      if(DB.tickets) {
          DB.tickets.forEach(t => { ticketCounts[t.empId] = (ticketCounts[t.empId]||0) + 1; });
      }

      let empData = [];
      if(DB.employees && DB.employees.length > 0) {
          empData = DB.employees.map(e => ({
              'الرقم الوظيفي': dis(e.id),
              'الاسم': dis(e.name),
              'السجل المدني': dis(e.nationalId),
              'رقم الجوال': dis(e.mobile),
              'الإيميل': dis(e.email),
              'الوظيفة': dis(e.job),
              'الإدارة': dis(e.dept),
              'القسم': dis(e.section),
              'عدد الطلبات': ticketCounts[e.id] || 0
          }));
      } else {
          empData = [{ 'الرقم الوظيفي': '-', 'الاسم': '-', 'ملاحظة': "لا يوجد موظفين حالياً" }];
      }

      const wsEmp = XLSX.utils.json_to_sheet(empData);
      XLSX.utils.book_append_sheet(wb, wsEmp, "الموظفين");

      XLSX.writeFile(wb, 'DB Backup.xlsx');
  } catch (err) {
      alert("حدث خطأ أثناء أخذ النسخة الاحتياطية. يرجى المحاولة مرة أخرى.");
      console.error(err);
  }
}

function importBackupExcel(evt){
  const file = evt.target.files[0]; if(!file) return;
  if(!confirm('تنبيه: سيتم استيراد/تحديث بيانات الموظفين من هذا الملف، ولن يتم مسح طلبات الدعم الحالية. هل أنت متأكد؟')) { evt.target.value=''; return; }
  
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const newDB = { ...DB }; 

      const empSheet = wb.Sheets["الموظفين"] || wb.Sheets["Employees"] || wb.Sheets[wb.SheetNames[0]];
      if(empSheet){
          const parsedEmp = XLSX.utils.sheet_to_json(empSheet, {defval:''});
          if(!parsedEmp[0]?.['ملاحظة']) {
              const cleanEmpList = [];
              parsedEmp.forEach(r => {
                  const row = {id:'', name:'', nationalId:'', mobile:'', email:'', job:'', dept:'', section:'', isAdmin:false};
                  Object.keys(r).forEach(h => {
                      const cleanH = normalizeHeader(h);
                      const key = HEADER_MAP[cleanH];
                      if(key) row[key] = (String(r[h]).trim() === 'x' || String(r[h]).trim() === '-') ? '' : String(r[h]).trim();
                  });
                  
                  if(row.id && row.id !== '-' && row.id !== 'x') {
                      const existing = DB.employees.find(x => x.id === row.id);
                      if(existing) row.isAdmin = existing.isAdmin;
                      cleanEmpList.push(row);
                  }
              });
              if(cleanEmpList.length > 0) newDB.employees = cleanEmpList;
          }
      }

      DB = newDB; 
      saveDB();
      setMsg('ok','تم استيراد وتحديث البيانات بنجاح');
      render();
    }catch(err){
      alert('حدث خطأ فني أثناء قراءة الملف: تأكد من أن الملف سليم.');
    }
  };
  reader.readAsArrayBuffer(file);
  evt.target.value='';
}

/* ---------------- init ---------------- */
render();
